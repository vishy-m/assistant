name: Assistant
options:
  bundleIdPrefix: com.vishruth
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  AssistantShared:
    path: "."
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 1.7.5
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  AssistantUI:
    type: application
    platform: macOS
    sources:
      - path: App/AssistantUI
    dependencies:
      - package: AssistantShared
        product: AssistantShared
      - package: AssistantShared
        product: AssistantGCal
      - package: AppAuth
        product: AppAuth
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vishruth.assistant
        INFOPLIST_FILE: App/AssistantUI/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/AssistantUI/AssistantUI.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

  AssistantCoreHelper:
    type: tool
    platform: macOS
    sources:
      - path: App/AssistantCoreHelper
    dependencies:
      - package: AssistantShared
        product: AssistantShared
      - package: AssistantShared
        product: AssistantStore
      - package: AssistantShared
        product: AssistantLLM
      - package: AssistantShared
        product: AssistantGCal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vishruth.assistant.core
        INFOPLIST_FILE: App/AssistantCoreHelper/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/AssistantCoreHelper/AssistantCoreHelper.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SKIP_INSTALL: NO
